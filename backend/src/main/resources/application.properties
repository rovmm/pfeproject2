spring.application.name=Quiz-platforme

# ── Base de données ───────────────────────────────────────────
# La variable DB_URL permet de configurer l'URL complète en une seule fois
# (utile pour Docker, Railway, Render, etc.).
# Par défaut : connexion locale pour le développement.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/Quiz}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
# validate : Hibernate vérifie que le schéma correspond aux entités
# sans modifier la base — Flyway est seul responsable des migrations.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jackson.deserialization.fail-on-unknown-properties=false

# ── Flyway ────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=4
spring.flyway.out-of-order=true
spring.flyway.validate-on-migrate=false

# ── JWT ───────────────────────────────────────────────────────
# Clé secrète HMAC-SHA256 : minimum 32 caractères (256 bits).
# Génération : openssl rand -hex 32
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ── Email (Gmail SMTP) ─────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ── App config ───────────────────────────────────────────────────
app.email.from-name=SmartStudy Platform
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# ── Upload de fichiers ────────────────────────────────────────
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=110MB

# ── Drive du professeur (fichiers de cours) ───────────────────
drive.upload.path=uploads/drive
drive.upload.max-size-mb=100

# ── Serveur ───────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ── AI (résumé PDF + analyse de code + génération de quiz) — Groq Cloud ──────
grok.api.key=${GROK_API_KEY}
grok.api.url=${GROK_API_URL:https://api.groq.com/openai/v1/chat/completions}
grok.model=${GROK_MODEL:llama-3.3-70b-versatile}

# ── Vision IA (lecture d'images uniquement) — Mistral via Open WebUI ─────────
vision.api.key=${VISION_API_KEY}
vision.api.url=${VISION_API_URL}
vision.model=${VISION_MODEL:mistral}

# ── Docker sandbox (exécution de code isolée) ────────────────
# Chemin vers le socket Docker Engine (Unix socket)
docker.socket.path=/var/run/docker.sock
# Délai maximal d'exécution par conteneur (secondes)
docker.execution.timeout-seconds=30
# Limite mémoire par conteneur (Mo)
docker.execution.memory-limit-mb=256

# ── Logging ───────────────────────────────────────────────────
# Passer security à DEBUG en développement pour voir les décisions d'autorisation.
# Ne jamais passer à DEBUG en production (expose les tokens dans les logs).
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.flywaydb=INFO
logging.level.com.example.quizplatforme=INFO
