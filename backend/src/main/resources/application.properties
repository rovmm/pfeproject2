spring.application.name=Quiz-platforme

# ── Base de données ───────────────────────────────────────────
# La variable DB_URL permet de configurer l'URL complète en une seule fois
# (utile pour Docker, Railway, Render, etc.).
# Par défaut : connexion locale pour le développement.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/Quiz}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
# validate : Hibernate vérifie que le schéma correspond aux entités
# sans modifier la base — Flyway est seul responsable des migrations.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jackson.deserialization.fail-on-unknown-properties=false

# ── Flyway ────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=4
spring.flyway.out-of-order=true
spring.flyway.validate-on-migrate=false

# ── JWT ───────────────────────────────────────────────────────
# Clé secrète HMAC-SHA256 : minimum 32 caractères (256 bits).
# Génération : openssl rand -hex 32
jwt.secret=${JWT_SECRET:smqrtstudy-dev-secret-key-min32chars-padding}
jwt.expiration=86400000

# ── Upload de fichiers ────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ── Serveur ───────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ── AI (résumé PDF + analyse de code) — local DeepSeek ───────
grok.api.url=http://102.54.244.89:8088/ollama/api/v1
grok.api.key=sk-Mp8Qw2ZxLc7Tn5Rv4Hy9Kj3Bd6Ua1FsE

# ── Docker sandbox (exécution de code isolée) ────────────────
# Chemin vers le socket Docker Engine (Unix socket)
docker.socket.path=/var/run/docker.sock
# Délai maximal d'exécution par conteneur (secondes)
docker.execution.timeout-seconds=30
# Limite mémoire par conteneur (Mo)
docker.execution.memory-limit-mb=256

# ── Logging ───────────────────────────────────────────────────
# Passer security à DEBUG en développement pour voir les décisions d'autorisation.
# Ne jamais passer à DEBUG en production (expose les tokens dans les logs).
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.flywaydb=INFO
logging.level.com.example.quizplatforme=INFO
